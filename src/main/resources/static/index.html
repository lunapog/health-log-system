<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧健康日誌與風險評估</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .badge-High { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .badge-Medium { background-color: #fef3c7; color: #92400e; border: 1px solid #fbbf24; }
        .badge-Low { background-color: #dcfce3; color: #166534; border: 1px solid #4ade80; }
    </style>
</head>
<body class="bg-gray-50 p-8 font-sans">

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-6">新增健康日誌</h2>
            <form id="healthForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">日期</label>
                    <input type="date" id="logDate" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">睡眠時數 (小時)</label>
                    <input type="number" id="sleepHours" step="0.1" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">今日步數</label>
                    <input type="number" id="steps" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">心情分數 (1 差 ~ 10 佳)</label>
                    <input type="number" id="moodScore" min="1" max="10" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition">分析並儲存</button>
            </form>

            <div id="resultArea" class="mt-8 hidden text-center p-4 bg-gray-50 rounded-lg border">
                <p class="text-sm text-gray-500 mb-2">決策樹評估結果</p>
                <span id="riskBadge" class="inline-block px-4 py-1 rounded-full text-lg font-bold"></span>
            </div>
        </div>

        <div class="md:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-6">歷史健康日誌</h2>
            <div class="overflow-x-auto h-[600px] overflow-y-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50 sticky top-0">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">日期</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">睡眠</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">步數</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">心情</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">風險等級</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="bg-white divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = '/api/health-logs';

        // 初始化當天日期
        document.getElementById('logDate').valueAsDate = new Date();

        // 讀取並渲染列表
        async function fetchLogs() {
            const response = await fetch(apiUrl);
            const data = await response.json();
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';
            
            data.forEach(log => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${log.logDate}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${log.sleepHours} h</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${log.steps}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${log.moodScore}/10</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full badge-${log.riskLevel}">
                            ${log.riskLevel}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="deleteLog(${log.id})" class="text-red-600 hover:text-red-900">刪除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 送出表單 (POST)
        document.getElementById('healthForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                logDate: document.getElementById('logDate').value,
                sleepHours: parseFloat(document.getElementById('sleepHours').value),
                steps: parseInt(document.getElementById('steps').value),
                moodScore: parseInt(document.getElementById('moodScore').value)
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const savedLog = await response.json();
            
            // 顯示即時計算結果 Badge
            const resultArea = document.getElementById('resultArea');
            const badge = document.getElementById('riskBadge');
            badge.textContent = `${savedLog.riskLevel} Risk`;
            badge.className = `inline-block px-4 py-1 rounded-full text-lg font-bold badge-${savedLog.riskLevel}`;
            resultArea.classList.remove('hidden');

            fetchLogs(); // 更新表格
        });

        // 刪除日誌 (DELETE)
        async function deleteLog(id) {
            if (confirm('確定要刪除這筆紀錄嗎？')) {
                await fetch(`${apiUrl}/${id}`, { method: 'DELETE' });
                fetchLogs();
            }
        }

        // 初次載入
        fetchLogs();
    </script>
</body>
</html>
